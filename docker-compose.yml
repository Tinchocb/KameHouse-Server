version: '3.8'

services:
  kamehouse:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: kamehouse-media-server
    restart: unless-stopped
    ports:
      - "43000:43000"
    volumes:
      # Map the data directory inside the container to a local directory for persistence
      - ./kamehouse-data:/data
    environment:
      - PORT=43000
      - GIN_MODE=release
    # user: "1000:1000" # Optional: run as a specific non-root user securely
