<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>KameHouse TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; color: #e0e0e0; font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; align-items: center; justify-content: center; }

        #app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; }

        .hidden { display: none !important; }

        .logo { font-size: 48px; font-weight: 800; letter-spacing: 2px; margin-bottom: 16px; }
        .logo span { color: #f97316; }
        .logo small { display: block; font-size: 14px; font-weight: 400; color: #888; letter-spacing: 4px; text-transform: uppercase; margin-top: 4px; }

        .subtitle { font-size: 18px; color: #999; margin-bottom: 40px; text-align: center; }

        .panel { background: #141414; border: 1px solid #2a2a2a; border-radius: 16px; padding: 40px; max-width: 700px; width: 100%; }

        h2 { font-size: 22px; font-weight: 600; margin-bottom: 24px; text-align: center; }

        .input-group { margin-bottom: 24px; }
        .input-group label { display: block; font-size: 14px; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input { width: 100%; padding: 16px 20px; font-size: 22px; background: #1e1e1e; border: 2px solid #333; border-radius: 10px; color: #e0e0e0; outline: none; transition: border-color .2s; }
        .input-group input:focus { border-color: #f97316; }
        .input-group input::placeholder { color: #555; }

        .input-hint { font-size: 13px; color: #666; margin-top: 6px; }

        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
        .btn-group > * + * { margin-left: 12px; }
        .btn { padding: 16px 36px; font-size: 18px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; transition: transform .15s, box-shadow .15s; outline: none; min-width: 180px; text-align: center; }
        .btn:focus, .btn.focused { transform: scale(1.05); box-shadow: 0 0 0 3px #f97316, 0 0 20px rgba(249,115,22,.3); }
        .btn-primary { background: #f97316; color: #fff; }
        .btn-primary:hover { background: #ea580c; }
        .btn-secondary { background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; }
        .btn-secondary:hover { background: #333; }
        .btn-danger { background: #7f1d1d; color: #e0e0e0; border: 1px solid #991b1b; }
        .btn-danger:hover { background: #991b1b; }

        .spinner { width: 56px; height: 56px; border: 4px solid #2a2a2a; border-top-color: #f97316; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 24px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-text { font-size: 18px; color: #ccc; text-align: center; }

        .error-icon { font-size: 48px; margin-bottom: 16px; }
        .error-title { font-size: 22px; font-weight: 600; color: #f87171; margin-bottom: 8px; }
        .error-detail { font-size: 16px; color: #999; margin-bottom: 28px; text-align: center; line-height: 1.5; }

        .loading-dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
        @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } 100% { content: ''; } }

        .scanning-list { list-style: none; margin-top: 16px; max-height: 250px; overflow-y: auto; font-size: 13px; color: #666; background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 12px; }
        .scanning-list li { padding: 3px 0; font-family: 'Courier New', monospace; }
        .scanning-list li.found { color: #4ade80; font-weight: bold; }
        .scanning-list li.fail { color: #444; }

        .help-text { margin-top: 24px; font-size: 13px; color: #555; text-align: center; line-height: 1.6; }

        @media (max-width: 600px) {
            .panel { padding: 24px; }
            .logo { font-size: 36px; }
            .btn { min-width: 140px; padding: 14px 24px; font-size: 16px; }
            .input-group input { font-size: 18px; padding: 14px 16px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="screen-config" class="hidden">
            <div class="logo">Kame<span>House</span><small>TV</small></div>
            <div class="subtitle">Configura tu servidor KameHouse</div>
            <div class="panel">
                <h2>Dirección del servidor</h2>
                <div class="input-group">
                    <label for="serverIP">IP o dominio</label>
                    <input type="text" id="serverIP" placeholder="ej: 192.168.1.100:43211" maxlength="100" autofocus>
                    <div class="input-hint">Incluí el puerto si no usás el predeterminado (43211)</div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="btn-connect" tabindex="0">Conectar</button>
                    <button class="btn btn-secondary" id="btn-scan" tabindex="0">Buscar en la red</button>
                </div>
                <div id="scan-results" class="hidden">
                    <ul class="scanning-list" id="scan-list"></ul>
                </div>
            </div>
            <div class="help-text">
                Presioná <strong>Enter</strong> para conectar &middot;
                Usá las <strong>flechas</strong> para navegar &middot;
                <strong>Return</strong> para salir
            </div>
        </div>

        <div id="screen-loading" class="hidden">
            <div class="spinner"></div>
            <div class="status-text" id="loading-text">Conectando a KameHouse<span class="loading-dots"></span></div>
        </div>

        <div id="screen-error" class="hidden">
            <div class="error-icon">&#9888;</div>
            <div class="error-title" id="error-title">Error de conexión</div>
            <div class="error-detail" id="error-detail">No se pudo conectar al servidor.</div>
            <div class="btn-group">
                <button class="btn btn-primary" id="btn-retry" tabindex="0">Reintentar</button>
                <button class="btn btn-secondary" id="btn-reconfig" tabindex="0">Cambiar dirección</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            var STORAGE_KEY = 'kamehouse_server';
            var DEFAULT_PORT = '43211';
            var CONNECT_TIMEOUT = 8000;
            var MAX_RETRIES = 2;

            var els = {};
            var currentScreen = null;
            var pendingIP = '';
            var retryCount = 0;
            var scanAbort = false;

            function $(id) { return document.getElementById(id); }

            function createTimeoutSignal(ms) {
                var ctrl = new AbortController();
                setTimeout(function () { ctrl.abort(); }, ms);
                return ctrl.signal;
            }

            function init() {
                els.config  = $('screen-config');
                els.loading = $('screen-loading');
                els.error   = $('screen-error');

                els.serverIP     = $('serverIP');
                els.btnConnect   = $('btn-connect');
                els.btnScan      = $('btn-scan');
                els.btnRetry     = $('btn-retry');
                els.btnReconfig  = $('btn-reconfig');
                els.scanResults  = $('scan-results');
                els.scanList     = $('scan-list');
                els.loadingText  = $('loading-text');
                els.errorTitle   = $('error-title');
                els.errorDetail  = $('error-detail');

                els.btnConnect.addEventListener('click', onConnectClick);
                els.btnScan.addEventListener('click', onScanClick);
                els.btnRetry.addEventListener('click', onRetryClick);
                els.btnReconfig.addEventListener('click', onReconfigClick);

                els.serverIP.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') onConnectClick();
                });

                document.addEventListener('keydown', onKeyDown);

                // Auto-conexión: mostrar loading y conectar directamente
                var saved = loadIP();
                if (saved) {
                    els.serverIP.value = saved;
                    pendingIP = saved;
                    doConnect(saved);
                } else {
                    doAutoConnect();
                }
            }

            function doAutoConnect() {
                showScreen('loading');
                els.loadingText.textContent = 'Buscando servidor KameHouse en la red...';
                quickAutoScan();
            }

            function onKeyDown(e) {
                var key = e.key;
                if (key === 'Return' || key === 'Exit' || key === 'Back') {
                    if (currentScreen === 'error') {
                        e.preventDefault();
                        showScreen('config');
                        focusFirstInput();
                    } else if (currentScreen === 'loading') {
                        e.preventDefault();
                        showScreen('config');
                        focusFirstInput();
                    }
                }

                if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight') {
                    e.preventDefault();
                    var focusable = getVisibleFocusable();
                    if (!focusable.length) return;
                    var idx = focusable.indexOf(document.activeElement);
                    if (idx === -1) { focusable[0].focus(); return; }
                    var cols = 2;
                    if (key === 'ArrowRight')      idx = Math.min(idx + 1, focusable.length - 1);
                    else if (key === 'ArrowLeft')  idx = Math.max(idx - 1, 0);
                    else if (key === 'ArrowDown')  idx = Math.min(idx + cols, focusable.length - 1);
                    else if (key === 'ArrowUp')    idx = Math.max(idx - cols, 0);
                    focusable[idx].focus();
                }

                if (key === 'Enter') {
                    var active = document.activeElement;
                    if (active && active.tagName === 'BUTTON') {
                        e.preventDefault();
                        active.click();
                    }
                }
            }

            function getVisibleFocusable() {
                var all = document.querySelectorAll('button, input, [tabindex]:not([tabindex="-1"])');
                return Array.prototype.filter.call(all, function (el) {
                    return el.offsetParent !== null;
                });
            }

            function showScreen(name) {
                [els.config, els.loading, els.error].forEach(function (s) { s.classList.add('hidden'); });
                currentScreen = name;
                var map = { config: els.config, loading: els.loading, error: els.error };
                if (map[name]) map[name].classList.remove('hidden');
            }

            function focusFirstInput() {
                setTimeout(function () {
                    var f = getVisibleFocusable();
                    if (f.length) f[0].focus();
                }, 100);
            }

            function loadIP() {
                try { return localStorage.getItem(STORAGE_KEY) || ''; } catch (e) { return ''; }
            }

            function saveIP(ip) {
                try { localStorage.setItem(STORAGE_KEY, ip); } catch (e) {}
            }

            function normalizeAddress(input) {
                input = input.trim();
                if (!input) return '';
                if (/^\d+\.\d+\.\d+\.\d+/.test(input) || /^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}/.test(input)) {
                    if (!/:\d+$/.test(input)) input += ':' + DEFAULT_PORT;
                    if (!/^https?:\/\//i.test(input)) input = 'http://' + input;
                    return input;
                }
                if (/^https?:\/\//i.test(input)) {
                    var u = input.replace(/\/+$/, '');
                    if (!/:\d+$/.test(u.replace(/^https?:\/\//i, ''))) {
                        u += ':' + DEFAULT_PORT;
                    }
                    return u;
                }
                return input;
            }

            function onConnectClick() {
                var raw = els.serverIP.value.trim();
                if (!raw) {
                    els.serverIP.focus();
                    els.serverIP.style.borderColor = '#f87171';
                    setTimeout(function () { els.serverIP.style.borderColor = ''; }, 1500);
                    return;
                }
                var addr = normalizeAddress(raw);
                pendingIP = addr;
                saveIP(addr);
                doConnect(addr);
            }

            function doConnect(url) {
                retryCount = 0;
                showScreen('loading');
                els.loadingText.textContent = 'Conectando a KameHouse' + String.fromCharCode(8230);
                attemptConnect(url);
            }

            function attemptConnect(url) {
                var controller = new AbortController();
                var timeoutId = setTimeout(function () { controller.abort(); }, CONNECT_TIMEOUT);

                fetch(url + '/api/v1/status', { signal: controller.signal, mode: 'cors' })
                    .then(function (r) {
                        clearTimeout(timeoutId);
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        return r.json();
                    })
                    .then(function (data) {
                        clearTimeout(timeoutId);
                        redirectTo(url);
                    })
                    .catch(function (err) {
                        clearTimeout(timeoutId);
                        if (err.name === 'AbortError') {
                            onConnectFail('Tiempo de espera agotado', 'El servidor no respondió en ' + (CONNECT_TIMEOUT / 1000) + ' segundos. Verificá que la dirección sea correcta y que el servidor esté encendido.');
                        } else {
                            // Try fallback to /api/health
                            var c2 = new AbortController();
                            var t2 = setTimeout(function () { c2.abort(); }, 3000);
                            fetch(url + '/api/health', { signal: c2.signal, mode: 'cors' })
                                .then(function (r2) {
                                    clearTimeout(t2);
                                    if (!r2.ok) throw new Error('HTTP ' + r2.status);
                                    return r2.json();
                                })
                                .then(function () {
                                    clearTimeout(t2);
                                    redirectTo(url);
                                })
                                .catch(function () {
                                    clearTimeout(t2);
                                    onConnectFail('Conexión rechazada', 'No se pudo establecer conexión con <strong>' + encodeHTML(url) + '</strong>.<br>' + encodeHTML(err.message));
                                });
                        }
                    });
            }

            function redirectTo(url) {
                showScreen('loading');
                els.loadingText.textContent = 'Conectado! Redirigiendo' + String.fromCharCode(8230);
                setTimeout(function () {
                    window.location.href = url;
                }, 600);
            }

            function onConnectFail(title, detail) {
                if (retryCount < MAX_RETRIES) {
                    retryCount++;
                    els.loadingText.textContent = 'Reintentando (' + retryCount + '/' + MAX_RETRIES + ')' + String.fromCharCode(8230);
                    setTimeout(function () { attemptConnect(pendingIP); }, 2000);
                    return;
                }
                showScreen('error');
                els.errorTitle.textContent = title || 'Error de conexión';
                els.errorDetail.innerHTML = detail || 'No se pudo conectar al servidor.';
                focusFirstInput();
            }

            function onRetryClick() {
                if (pendingIP) doConnect(pendingIP);
                else showScreen('config');
            }

            function onReconfigClick() {
                showScreen('config');
                focusFirstInput();
            }

            function onScanClick() {
                var raw = els.serverIP.value.trim();
                var userSubnet = '';
                var userPort = DEFAULT_PORT;
                if (/^\d+\.\d+\.\d+\.\d+/.test(raw)) {
                    var parts = raw.replace(/:\d+$/, '').split('.').slice(0, 3).join('.');
                    userSubnet = parts;
                    var portMatch = raw.match(/:(\d+)$/);
                    if (portMatch) userPort = portMatch[1];
                }

                var COMMON_SUBNETS = ['192.168.1', '192.168.0', '192.168.50', '192.168.86', '10.0.0', '10.0.1', '10.1.1', '172.16.0', '172.16.1', '172.20.10'];
                var subnets = [];
                if (userSubnet) subnets.push(userSubnet);
                for (var i = 0; i < COMMON_SUBNETS.length; i++) {
                    if (COMMON_SUBNETS[i] !== userSubnet) subnets.push(COMMON_SUBNETS[i]);
                }

                els.scanResults.classList.remove('hidden');
                els.scanList.innerHTML = '';
                scanAbort = false;
                els.btnScan.disabled = true;
                els.btnScan.textContent = 'Buscando...';
                els.btnConnect.focus();

                var BATCH = 15;
                var found = false;
                var totalSubnets = subnets.length;
                var subnetIdx = 0;

                function addLog(text, cls) {
                    var li = document.createElement('li');
                    li.textContent = text;
                    if (cls) li.className = cls;
                    els.scanList.appendChild(li);
                    els.scanList.scrollTop = els.scanList.scrollHeight;
                    return li;
                }

                function checkSubnet(subnet, port, callback) {
                    addLog('Escaneando ' + subnet + '.1-254 (puerto ' + port + ')...', '');
                    var ip = 1;
                    function nextBatch() {
                        if (scanAbort || ip > 254) { callback(); return; }
                        var count = Math.min(BATCH, 254 - ip + 1);
                        var promises = [];
                        for (var j = 0; j < count; j++) {
                            (function (currIP) {
                                var url = 'http://' + subnet + '.' + currIP + ':' + port;
                                promises.push(
                                    fetch(url + '/api/v1/status', { signal: createTimeoutSignal(1500), mode: 'cors' })
                                        .then(function (r) {
                                            if (!r.ok) throw new Error(String(r.status));
                                            return r.json().then(function (data) { return data.version ? currIP : null; });
                                        })
                                        .catch(function () {
                                            return fetch(url + '/api/health', { signal: createTimeoutSignal(800), mode: 'cors' })
                                                .then(function (r2) {
                                                    if (!r2.ok) throw new Error();
                                                    return r2.json().then(function (d) { return d.app === 'KameHouse' ? currIP : null; });
                                                })
                                                .catch(function () { return null; });
                                        })
                                );
                            })(ip + j);
                        }
                        ip += count;
                        Promise.all(promises).then(function (results) {
                            for (var k = 0; k < results.length; k++) {
                                if (results[k]) {
                                    var foundIP = results[k];
                                    addLog('  ' + foundIP + ':' + port + '  \u2713  Encontrado!', 'found');
                                    els.serverIP.value = foundIP + ':' + port;
                                    found = true;
                                    pendingIP = normalizeAddress(foundIP + ':' + port);
                                    saveIP(pendingIP);
                                    scanAbort = true;
                                    break;
                                }
                            }
                            if (scanAbort) { callback(); return; }
                            setTimeout(nextBatch, 10);
                        });
                    }
                    nextBatch();
                }

                function scanNextSubnet() {
                    if (scanAbort || subnetIdx >= totalSubnets) {
                        els.btnScan.disabled = false;
                        els.btnScan.textContent = 'Buscar en la red';
                        if (!found) {
                            addLog('No se encontraron servidores. Ingresá la IP manualmente.', '');
                        }
                        return;
                    }
                    var subnet = subnets[subnetIdx];
                    var port = (subnet === userSubnet && raw.match(/:(\d+)$/)) ? userPort : DEFAULT_PORT;
                    subnetIdx++;
                    checkSubnet(subnet, port, function () {
                        if (found) {
                            els.btnScan.disabled = false;
                            els.btnScan.textContent = 'Buscar en la red';
                            addLog('Conectando al servidor encontrado...', 'found');
                            setTimeout(function () { doConnect(pendingIP); }, 500);
                            return;
                        }
                        setTimeout(scanNextSubnet, 50);
                    });
                }

                addLog('Buscando servidores KameHouse en la red...', '');
                setTimeout(scanNextSubnet, 100);
            }

            function quickAutoScan() {
                var COMMON_SUBNETS = ['192.168.1', '192.168.0', '192.168.50', '192.168.86', '10.0.0', '10.0.1'];
                var SCAN_BATCH = 15;
                var found = false;

                els.scanResults.classList.remove('hidden');
                els.scanList.innerHTML = '';
                els.btnScan.disabled = true;
                els.btnScan.textContent = 'Auto-buscando...';

                var li0 = document.createElement('li');
                li0.textContent = 'Buscando servidores KameHouse en la red...';
                els.scanList.appendChild(li0);

                var subnetsDone = 0;
                COMMON_SUBNETS.forEach(function (subnet) {
                    var ip = 1;
                    function nextBatch() {
                        if (found || ip > 254) {
                            subnetsDone++;
                            if (subnetsDone >= COMMON_SUBNETS.length && !found) {
                                els.btnScan.disabled = false;
                                els.btnScan.textContent = 'Buscar en la red';
                                li0.textContent = 'No se encontró ningún servidor automáticamente.';
                            }
                            return;
                        }
                        var count = Math.min(SCAN_BATCH, 254 - ip + 1);
                        var promises = [];
                        for (var j = 0; j < count; j++) {
                            (function (currIP) {
                                var url = 'http://' + subnet + '.' + currIP + ':' + DEFAULT_PORT;
                                promises.push(
                                    fetch(url + '/api/v1/status', { signal: createTimeoutSignal(1200), mode: 'cors' })
                                        .then(function (r) {
                                            if (!r.ok) throw new Error();
                                            return r.json().then(function (data) { return data.version ? subnet + '.' + currIP : null; });
                                        })
                                        .catch(function () {
                                            return fetch(url + '/api/health', { signal: createTimeoutSignal(600), mode: 'cors' })
                                                .then(function (r2) {
                                                    if (!r2.ok) throw new Error();
                                                    return r2.json().then(function (d) { return d.app === 'KameHouse' ? subnet + '.' + currIP : null; });
                                                })
                                                .catch(function () { return null; });
                                        })
                                );
                            })(ip + j);
                        }
                        ip += count;
                        Promise.all(promises).then(function (results) {
                            for (var k = 0; k < results.length; k++) {
                                if (results[k]) {
                                    found = true;
                                    var foundIP = results[k];
                                    li0.textContent = 'Servidor encontrado: ' + foundIP + ':' + DEFAULT_PORT;
                                    li0.className = 'found';
                                    els.serverIP.value = foundIP + ':' + DEFAULT_PORT;
                                    pendingIP = normalizeAddress(foundIP + ':' + DEFAULT_PORT);
                                    saveIP(pendingIP);
                                    els.btnScan.disabled = false;
                                    els.btnScan.textContent = 'Buscar en la red';
                                    setTimeout(function () { doConnect(pendingIP); }, 600);
                                    return;
                                }
                            }
                            setTimeout(nextBatch, 5);
                        });
                    }
                    nextBatch();
                });
            }

            function encodeHTML(str) {
                var div = document.createElement('div');
                div.appendChild(document.createTextNode(str));
                return div.innerHTML;
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
