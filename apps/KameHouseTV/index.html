<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>KameHouse TV</title>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <script src="$WEBAPIS/webapis/webapis.js"></script>
</head>
<body>
    <div id="app"></div>
    <script>
        (function () {
            'use strict';
            
            const STATE_LOADING = 'loading';
            const STATE_ERROR = 'error';
            const STATE_CONFIG = 'config';
            
            var currentState = STATE_LOADING;
            var SERVER_URL = 'http://192.168.100.2:43211';
            var CONNECT_TIMEOUT = 30000;
            var MAX_RETRIES = 2;
            
            var retryCount = 0;
            var scanResults = [];
            
            function $(id) { return document.getElementById(id); }
            
            function init() {
                registerTizenKeys();
                updateUI();
                doConnect();
            }
            
            function registerTizenKeys() {
                try {
                    if (typeof window.tizen !== 'undefined' && window.tizen.tvinputdevice) {
                        var keys = ['VolumeUp', 'VolumeDown', 'VolumeMute', 'Play', 'Pause', 'PlayPause', 'MediaPlay', 'MediaPause', 'MediaStop'];
                        keys.forEach(function (k) {
                            try { window.tizen.tvinputdevice.registerKey(k); } catch (e) {}
                        });
                    }
                } catch (e) {}
            }
            
            function updateUI() {
                if (currentState === STATE_LOADING) {
                    $('#app').innerHTML = `
                        <div class="kh-panel">
                            <div class="kh-spinner"></div>
                            <div class="kh-status-text" id="loading-text">Conectando a KameHouse<span class="kh-loading-dots"></span></div>
                        </div>
                    `;
                } else if (currentState === STATE_ERROR) {
                    $('#app').innerHTML = `
                        <div class="kh-panel">
                            <div class="kh-error-icon">&#9888;</div>
                            <div class="kh-error-title" id="error-title">Error de conexión</div>
                            <div class="kh-error-detail" id="error-detail">No se pudo conectar al servidor.</div>
                            <div class="kh-btn-group">
                                <button class="kh-btn kh-btn-primary kh-focusable" id="btn-retry">Reintentar</button>
                                <button class="kh-btn kh-btn-secondary kh-focusable" id="btn-exit">Salir</button>
                            </div>
                        </div>
                    `;
                    $("#btn-retry").addEventListener('click', function () { onRetryClick(); });
                    $("#btn-exit").addEventListener('click', exitApp);
                    ["#btn-retry", "#btn-exit"].forEach(selector => {
                        var el = $(selector);
                        el.addEventListener('focus', function() { el.classList.add('focused'); });
                        el.addEventListener('blur',  function() { el.classList.remove('focused'); });
                    });
                } else if (currentState === STATE_CONFIG) {
                    $('#app').innerHTML = `
                        <div class="kh-panel kh-config-panel">
                            <div class="kh-logo">KameHouse<span class="kh-logo-orange">TV</span></div>
                            <h2 class="kh-panel-title">Configurar Servidor</h2>
                            <div class="kh-input-group">
                                <label class="kh-input-label" for="server-input">Dirección del servidor</label>
                                <input type="text" id="server-input" class="kh-input kh-focusable" placeholder="http://192.168.100.2:43211" value="${SERVER_URL}">
                            </div>
                            <div class="kh-button-row">
                                <button class="kh-btn kh-btn-primary kh-focusable" id="btn-connect">Conectar</button>
                                <button class="kh-btn kh-btn-secondary kh-focusable" id="btn-scan">Buscar red</button>
                            </div>
                        </div>
                    `;
                    $("#btn-connect").addEventListener('click', function () { onConnectClick(); });
                    $("#btn-scan").addEventListener('click', function () { onScanClick(); });
                    $("#server-input").addEventListener('focus', function() { this.select(); });
                    ["#btn-connect", "#btn-scan", "#server-input"].forEach(selector => {
                        var el = $(selector);
                        el.addEventListener('focus', function() { el.classList.add('focused'); });
                        el.addEventListener('blur',  function() { el.classList.remove('focused'); });
                    });
                }
                
                document.addEventListener('keydown', onKeyDown);
            }
            
            function onKeyDown(e) {
                var key = e.key, code = e.keyCode;
                if (key === 'Return' || code === 10009 || key === 'Back' || code === 27) {
                    e.preventDefault();
                    if (currentState === STATE_CONFIG) {
                        onBackFromConfig();
                    } else if (currentState === STATE_ERROR || currentState === STATE_LOADING) {
                        exitApp();
                    }
                    return;
                }
                if (key === 'ArrowLeft' || code === 37 || key === 'ArrowRight' || code === 39) {
                    e.preventDefault();
                    var btns = ["#btn-connect", "#btn-scan", "#server-input", "#btn-retry", "#btn-exit"].filter(function (s) { return $(s) && $(s).offsetParent !== null; });
                    var idx = btns.indexOf(document.activeElement);
                    if (idx === -1) { btns[0] && btns[0].focus(); return; }
                    var next = (key === 'ArrowRight' || code === 39) ? Math.min(idx + 1, btns.length - 1) : Math.max(idx - 1, 0);
                    btns[next].focus();
                }
                if (key === 'Enter' || code === 13) {
                    var active = document.activeElement;
                    if (active && typeof active.click === 'function') { e.preventDefault(); active.click(); }
                }
            }
            
            function exitApp() {
                try {
                    if (typeof window.tizen !== 'undefined' && window.tizen.application) {
                        window.tizen.application.getCurrentApplication().exit();
                    } else {
                        window.close();
                    }
                } catch (e) {}
            }
            
            function doConnect() {
                retryCount = 0;
                currentState = STATE_LOADING;
                updateUI();
                attemptConnect();
            }
            
            function attemptConnect() {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', SERVER_URL + '/api/health', true);
                xhr.timeout = CONNECT_TIMEOUT;
                xhr.onload = function () {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        redirectTo();
                    } else {
                        onFail();
                    }
                };
                xhr.onerror   = onFail;
                xhr.ontimeout = function () { onTimeout(); };
                xhr.send();
            }
            
            function onFail() {
                if (retryCount < MAX_RETRIES) {
                    retryCount++;
                    currentState = STATE_LOADING;
                    updateUI();
                    setTimeout(attemptConnect, 2000);
                } else {
                    currentState = STATE_ERROR;
                    updateUI();
                }
            }
            
            function onTimeout() {
                currentState = STATE_ERROR;
                updateUI();
            }
            
            function redirectTo() {
                currentState = STATE_LOADING;
                updateUI();
                setTimeout(function () {
                    window.location.replace(SERVER_URL + '?tvMode=true');
                }, 400);
            }
            
            function onConnectClick() {
                SERVER_URL = $("#server-input").value.trim();
                if (!SERVER_URL) {
                    currentState = STATE_ERROR;
                    updateUI();
                    return;
                }
                doConnect();
            }
            
            function onRetryClick() {
                doConnect();
            }
            
            function onBackFromConfig() {
                if (currentState === STATE_ERROR) {
                    doConnect();
                } else {
                    doConnect();
                }
            }
            
            function onScanClick() {
                alert('Escaneo de red: activar cuando esté listo');
            }
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
